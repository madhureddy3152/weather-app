<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast | Premium Weather App</title>
    <meta name="description"
        content="A premium, glassmorphic weather application providing real-time weather updates and forecasts.">
   
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- <link rel="stylesheet" href="style.css"> -->
     <link rel="stylesheet" href="indexw.css">
</head>

<body>
    <div class="bg-gradient"></div>

    <main class="container">
        <!-- Search Area -->
        <header class="search-box glass">
            <input type="text" id="city-input" placeholder="Search city..." autocomplete="off">
            <div class="search-buttons">
                <button id="loc-btn" aria-label="Use Live Location" title="Use Live Location">
                    <i data-lucide="map-pin"></i>
                </button>
                <button id="search-btn" aria-label="Search" title="Search city">
                    <i data-lucide="search"></i>
                </button>
            </div>
        </header>

        <!-- Current Weather -->
        <section id="current-weather" class="glass fade-in">
            <div class="weather-main">
                <div class="location">
                    <h1 id="city-name">Loading...</h1>
                    <p id="current-date">-- -- ----</p>
                </div>
                <div class="temp-container">
                    <span id="temperature">--</span><span class="unit">°C</span>
                </div>
                <div class="condition">
                    <i id="weather-icon" data-lucide="cloud-sun" class="large-icon"></i>
                    <p id="weather-description">Clear Skies</p>
                </div>
            </div>

            <div class="weather-details">
                <div class="detail-item">
                    <i data-lucide="droplets"></i>
                    <div class="detail-info">
                        <span id="humidity">--%</span>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="detail-item">
                    <i data-lucide="wind"></i>
                    <div class="detail-info">
                        <span id="wind-speed">-- km/h</span>
                        <p>Wind Speed</p>
                    </div>
                </div>
                <div class="detail-item">
                    <i data-lucide="thermometer"></i>
                    <div class="detail-info">
                        <span id="feels-like">--°C</span>
                        <p>Feels Like</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Forecast Area -->
        <section class="forecast-section">
            <h2 class="section-title">7-Day Forecast</h2>
            <div id="forecast-container" class="forecast-grid">
                <!-- Forecast items will be injected here -->
                <div class="forecast-skeleton glass"></div>
                <div class="forecast-skeleton glass"></div>
                <div class="forecast-skeleton glass"></div>
                <div class="forecast-skeleton glass"></div>
                <div class="forecast-skeleton glass"></div>
            </div>
        </section>
    </main>

    <script src="scriptw.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>

</html>
